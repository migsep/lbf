
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0e;color:#f0f0f0;font-family:system-ui,sans-serif}
.app{padding:2rem 1.5rem;max-width:860px;margin:0 auto}
.header{text-align:center;margin-bottom:2.5rem}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;color:#f0f0f0}
.header p{font-size:0.82rem;color:#888;margin-top:0.4rem;font-family:monospace}
.steps{display:flex;margin-bottom:2rem;background:#1a1a1e;border:1px solid #2e2e35;border-radius:12px;padding:4px}
.step-btn{flex:1;padding:0.55rem 0.4rem;border:none;background:transparent;cursor:pointer;border-radius:8px;font-size:0.78rem;font-weight:500;color:#888;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.step-btn.active{background:#f59e0b;color:#0c0c0e}
.step-btn.done{color:#aaa}
.step-num{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0}
.card{background:#1a1a1e;border:1px solid #2e2e35;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#f59e0b;margin-bottom:1rem;font-family:monospace}
.field{margin-bottom:1rem}
label{display:block;font-size:0.8rem;color:#aaa;margin-bottom:0.4rem}
input[type=text],textarea,select{width:100%;background:#0c0c0e;border:1px solid #2e2e35;border-radius:8px;padding:0.6rem 0.85rem;color:#f0f0f0;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s}
input[type=text]:focus,textarea:focus{border-color:#f59e0b}
textarea{min-height:85px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.pages-list{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem}
.page-tag{display:flex;align-items:center;gap:4px;background:#0c0c0e;border:1px solid #3a3a42;border-radius:6px;padding:0.3rem 0.6rem}
.page-tag input{background:transparent;border:none;color:#f0f0f0;font-size:0.8rem;width:110px;padding:0;outline:none}
.rm-btn{background:none;border:none;cursor:pointer;color:#666;font-size:15px;line-height:1;padding:0 0 0 2px}
.rm-btn:hover{color:#ef4444}
.add-page-btn{background:transparent;border:1px dashed #3a3a42;border-radius:6px;padding:0.3rem 0.75rem;font-size:0.8rem;color:#888;cursor:pointer}
.add-page-btn:hover{border-color:#f59e0b;color:#f59e0b}
.drop-zone{border:2px dashed #3a3a42;border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:#f59e0b;background:#1c1600}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-text{font-size:0.85rem;color:#888}
.drop-text strong{color:#f59e0b}
.pdf-list{display:flex;flex-direction:column;gap:0.5rem;margin-top:1rem}
.pdf-item{display:flex;align-items:center;gap:10px;background:#0c0c0e;border:1px solid #2e2e35;border-radius:8px;padding:0.55rem 0.85rem;font-size:0.82rem;color:#f0f0f0}
.pdf-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdf-size{color:#666;font-size:0.72rem;font-family:monospace}
.palettes{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1rem}
.pal-btn{background:#0c0c0e;border:2px solid #2e2e35;border-radius:10px;padding:0.75rem;cursor:pointer;transition:border-color 0.2s;text-align:left}
.pal-btn.sel{border-color:#f59e0b}
.swatches{display:flex;gap:4px;margin-bottom:0.5rem}
.swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.1)}
.pal-name{font-size:0.75rem;color:#aaa}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem}
.opt-btn{background:#0c0c0e;border:2px solid #2e2e35;border-radius:10px;padding:0.75rem;cursor:pointer;transition:border-color 0.2s;text-align:left}
.opt-btn.sel{border-color:#f59e0b}
.opt-label{font-size:0.85rem;font-weight:600;color:#f0f0f0;margin-bottom:0.2rem}
.opt-desc{font-size:0.72rem;color:#888}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem}
.btn{padding:0.65rem 1.4rem;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:#f59e0b;color:#0c0c0e}
.btn-primary:hover{background:#fbbf24}
.btn-ghost{background:transparent;border:1px solid #3a3a42;color:#aaa}
.btn-ghost:hover{border-color:#f59e0b;color:#f59e0b}
.btn-green{background:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.btn-purple{background:#7c3aed;color:#fff}
.btn-purple:hover{background:#6d28d9}
.generating{display:flex;flex-direction:column;align-items:center;padding:4rem 2rem;text-align:center}
.spinner{width:46px;height:46px;border:3px solid #2e2e35;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.success-bar{background:#052e16;border:1px solid #166534;border-radius:10px;padding:0.9rem 1.25rem;display:flex;align-items:center;gap:10px;color:#86efac;margin-bottom:1rem;font-weight:500}
.actions{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem}
.error-box{background:#1c0a0a;border:1px solid #7f1d1d;border-radius:8px;padding:1rem;color:#fca5a5;font-size:0.82rem;margin-top:1rem;font-family:monospace}
.iframe-wrap{border:1px solid #2e2e35;border-radius:10px;overflow:hidden;margin-bottom:1rem}
iframe{width:100%;height:520px;border:none;display:block;background:#fff}
.html-pre{background:#0c0c0e;border:1px solid #2e2e35;border-radius:8px;padding:1rem;font-family:monospace;font-size:0.7rem;color:#666;max-height:160px;overflow-y:auto;word-break:break-all;line-height:1.5;margin-bottom:1rem}
</style>

<div class="app">
  <div class="header">
    <h1>⚡ AI Website Generator</h1>
    <p>Décrivez → Uploadez → Stylez → Téléchargez</p>
  </div>
  <div class="steps" id="steps-bar"></div>
  <div id="main-content"></div>
  <div id="error-area"></div>
</div>

<script>
const PALETTES=[
  {id:'midnight',label:'Midnight',colors:['#0a0a0f','#1a1a2e','#7c3aed','#ffffff']},
  {id:'ocean',label:'Océan',colors:['#0f172a','#1e3a5f','#0ea5e9','#f0f9ff']},
  {id:'forest',label:'Forêt',colors:['#0a1a0d','#1a3a20','#22c55e','#f0fdf4']},
  {id:'sunset',label:'Sunset',colors:['#1a0a05','#3a1a0a','#f97316','#fff7ed']},
  {id:'slate',label:'Slate',colors:['#0f172a','#1e293b','#94a3b8','#f8fafc']},
  {id:'rose',label:'Rose',colors:['#1a050d','#3a0f1f','#f43f5e','#fff1f2']},
];
const FONTS=[
  {id:'modern',label:'Modern',desc:'Épuré & minimal'},
  {id:'editorial',label:'Editorial',desc:'Serif & raffiné'},
  {id:'bold',label:'Bold',desc:'Fort & impactant'},
];
const LAYOUTS=[
  {id:'standard',label:'Standard',desc:'Structure classique'},
  {id:'minimal',label:'Minimal',desc:'Beaucoup d\'espace'},
  {id:'creative',label:'Creative',desc:'Asymétrique & dynamique'},
];

const S={
  step:1,name:'',tagline:'',description:'',
  pages:['Accueil','À propos','Services','Contact'],
  pdfs:[],palette:'midnight',font:'modern',layout:'standard',
  generating:false,html:'',showPreview:false,error:''
};

const fmt=b=>b<1024?b+'B':(b/1024).toFixed(1)+'KB';

function readInputs(){
  const v=id=>document.getElementById(id);
  if(v('inp-name'))S.name=v('inp-name').value;
  if(v('inp-tagline'))S.tagline=v('inp-tagline').value;
  if(v('inp-desc'))S.description=v('inp-desc').value;
  document.querySelectorAll('.page-input').forEach((el,i)=>{if(S.pages[i]!==undefined)S.pages[i]=el.value;});
}

function goTo(n){readInputs();S.step=n;renderAll();}

function renderSteps(){
  const labels=['Décrire','Contenu','Style','Résultat'];
  document.getElementById('steps-bar').innerHTML=labels.map((l,i)=>{
    const n=i+1,cls=S.step===n?'active':S.step>n?'done':'';
    return `<button class="step-btn ${cls}" onclick="goTo(${n})">
      <div class="step-num"><span>${n}</span></div>${l}
    </button>`;
  }).join('');
}

function renderStep1(){
  return `
  <div class="card">
    <div class="card-title">01 — Identité du site</div>
    <div class="row">
      <div class="field"><label>Nom du site *</label>
        <input type="text" id="inp-name" placeholder="Ex: Agence Nova" value="${esc(S.name)}">
      </div>
      <div class="field"><label>Tagline</label>
        <input type="text" id="inp-tagline" placeholder="Ex: Design qui inspire." value="${esc(S.tagline)}">
      </div>
    </div>
    <div class="field"><label>Description (contexte pour l'IA)</label>
      <textarea id="inp-desc" placeholder="Décrivez votre activité, votre cible, vos valeurs...">${esc(S.description)}</textarea>
    </div>
  </div>
  <div class="card">
    <div class="card-title">02 — Pages du site</div>
    <div class="pages-list">
      ${S.pages.map((p,i)=>`<div class="page-tag">
        <input class="page-input" type="text" value="${esc(p)}" maxlength="24">
        ${S.pages.length>1?`<button class="rm-btn" onclick="removePage(${i})">×</button>`:''}
      </div>`).join('')}
      ${S.pages.length<8?'<button class="add-page-btn" onclick="addPage()">+ Ajouter</button>':''}
    </div>
  </div>
  <div class="nav">
    <div></div>
    <button class="btn btn-primary" onclick="next1()">Suivant →</button>
  </div>`;
}

function next1(){
  readInputs();
  if(!S.name.trim()){alert('Donnez un nom au site.');return;}
  S.step=2;renderAll();
}
function addPage(){readInputs();S.pages.push('Nouvelle page');S.step=1;renderAll();}
function removePage(i){readInputs();S.pages.splice(i,1);S.step=1;renderAll();}

function renderStep2(){
  return `
  <div class="card">
    <div class="card-title">03 — Contenu PDF <span style="font-size:0.7rem;font-weight:400;color:#888">(optionnel)</span></div>
    <div class="drop-zone" id="dropzone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <input type="file" accept=".pdf" multiple onchange="handleFileInput(this)">
      <div style="font-size:2rem;opacity:0.4;margin-bottom:0.5rem">📄</div>
      <div class="drop-text">Glissez vos PDF ici ou <strong>cliquez pour parcourir</strong></div>
      <div style="font-size:0.75rem;color:#666;margin-top:0.35rem">Claude extrait et intègre le contenu automatiquement</div>
    </div>
    ${S.pdfs.length>0?`<div class="pdf-list">${S.pdfs.map((p,i)=>`
      <div class="pdf-item">
        <span style="color:#f59e0b">📎</span>
        <span class="pdf-name">${esc(p.name)}</span>
        <span class="pdf-size">${fmt(p.size)}</span>
        <button class="rm-btn" onclick="removePdf(${i})">×</button>
      </div>`).join('')}</div>`:''}
  </div>
  <div class="nav">
    <button class="btn btn-ghost" onclick="goTo(1)">← Retour</button>
    <button class="btn btn-primary" onclick="goTo(3)">Suivant →</button>
  </div>`;
}

async function handleFiles(files){
  for(const f of files){
    if(f.type==='application/pdf'){
      const b64=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result.split(',')[1]);rd.readAsDataURL(f);});
      S.pdfs.push({name:f.name,base64:b64,size:f.size});
    }
  }
  S.step=2;renderAll();
}
function handleFileInput(i){handleFiles(Array.from(i.files));}
function handleDrop(e){e.preventDefault();document.getElementById('dropzone')?.classList.remove('drag');handleFiles(Array.from(e.dataTransfer.files));}
function removePdf(i){S.pdfs.splice(i,1);S.step=2;renderAll();}

function renderStep3(){
  return `
  <div class="card">
    <div class="card-title">04 — Palette de couleurs</div>
    <div class="palettes">
      ${PALETTES.map(p=>`<button class="pal-btn${S.palette===p.id?' sel':''}" onclick="S.palette='${p.id}';S.step=3;renderAll()">
        <div class="swatches">${p.colors.map(c=>`<div class="swatch" style="background:${c}"></div>`).join('')}</div>
        <div class="pal-name">${p.label}</div>
      </button>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">05 — Typographie</div>
    <div class="opt-grid">
      ${FONTS.map(f=>`<button class="opt-btn${S.font===f.id?' sel':''}" onclick="S.font='${f.id}';S.step=3;renderAll()">
        <div class="opt-label">${f.label}</div><div class="opt-desc">${f.desc}</div>
      </button>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">06 — Layout</div>
    <div class="opt-grid">
      ${LAYOUTS.map(l=>`<button class="opt-btn${S.layout===l.id?' sel':''}" onclick="S.layout='${l.id}';S.step=3;renderAll()">
        <div class="opt-label">${l.label}</div><div class="opt-desc">${l.desc}</div>
      </button>`).join('')}
    </div>
  </div>
  <div class="nav">
    <button class="btn btn-ghost" onclick="goTo(2)">← Retour</button>
    <button class="btn btn-primary" onclick="startGenerate()">⚡ Générer le site</button>
  </div>`;
}

async function startGenerate(){
  S.generating=true;S.error='';S.html='';renderAll();
  try{
    const pal=PALETTES.find(p=>p.id===S.palette);
    const fontInstr=S.font==='editorial'?'Playfair Display + Lato':S.font==='bold'?'Oswald + Roboto':'Plus Jakarta Sans';
    const content=[];
    S.pdfs.forEach(p=>content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:p.base64}}));
    content.push({type:'text',text:`Tu es un expert développeur web. Génère un site web complet en HTML/CSS/JS.

NOM: ${S.name} | TAGLINE: ${S.tagline||''} | DESCRIPTION: ${S.description||'Un site professionnel.'}
PAGES: ${S.pages.join(', ')}
PALETTE: fond ${pal.colors[0]}, secondaire ${pal.colors[1]}, accent ${pal.colors[2]}, texte ${pal.colors[3]}
TYPO: ${fontInstr} (Google Fonts) | LAYOUT: ${S.layout}
${S.pdfs.length>0?`Intègre le contenu des ${S.pdfs.length} PDF(s) fournis.`:''}

EXIGENCES: Fichier HTML unique, CSS+JS embarqués, SPA avec smooth scroll, responsive, hero avec CTA, animations CSS subtiles, footer, contenu réaliste.
RÉPONDS UNIQUEMENT avec le HTML complet. Commence par <!DOCTYPE html>. Aucun texte avant ou après.`});

    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content}]})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const html=data.content?.find(b=>b.type==='text')?.text||'';
    if(!html)throw new Error('Aucun contenu généré');
    S.html=html;S.generating=false;S.step=4;renderAll();
  }catch(e){S.error=e.message;S.generating=false;S.step=3;renderAll();}
}

function renderStep4(){
  const blobUrl=URL.createObjectURL(new Blob([S.html],{type:'text/html'}));
  return `
  <div class="success-bar">
    <span>✓</span>
    <span>Site généré avec succès !</span>
    <span style="margin-left:auto;font-size:0.75rem;font-family:monospace;color:#4ade80">${(S.html.length/1024).toFixed(1)} KB</span>
  </div>
  <div class="actions">
    <button class="btn btn-green" onclick="download()">↓ Télécharger le HTML</button>
    <button class="btn btn-purple" onclick="togglePreview()">${S.showPreview?'Masquer':'Prévisualiser'} ↗</button>
    <button class="btn btn-ghost" onclick="newSite()">↺ Nouveau site</button>
  </div>
  ${S.showPreview?`<div class="iframe-wrap"><iframe src="${blobUrl}" sandbox="allow-scripts allow-same-origin"></iframe></div>`
    :`<div class="html-pre">${S.html.substring(0,500).replace(/</g,'&lt;').replace(/>/g,'&gt;')}...</div>`}
  <div class="nav">
    <button class="btn btn-ghost" onclick="goTo(3)">← Modifier le style</button>
    <span style="font-size:0.78rem;color:#666;font-family:monospace">Prêt à déployer</span>
  </div>`;
}

function download(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([S.html],{type:'text/html'}));
  a.download=(S.name||'website').toLowerCase().replace(/\s+/g,'-')+'.html';
  a.click();
}
function togglePreview(){S.showPreview=!S.showPreview;S.step=4;renderAll();}
function newSite(){S.step=1;S.html='';S.showPreview=false;S.error='';renderAll();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderAll(){
  renderSteps();
  document.getElementById('main-content').innerHTML=
    S.generating?`<div class="generating">
      <div class="spinner"></div>
      <div style="font-size:1.05rem;font-weight:600;color:#f0f0f0;margin-bottom:0.5rem">Génération en cours…</div>
      <div style="font-size:0.8rem;color:#888;font-family:monospace">Claude construit votre site${S.pdfs.length?' et extrait les PDF':''}</div>
    </div>`:
    S.step===1?renderStep1():
    S.step===2?renderStep2():
    S.step===3?renderStep3():renderStep4();
  document.getElementById('error-area').innerHTML=
    S.error?`<div class="error-box">Erreur : ${esc(S.error)}</div>`:'';
}

renderAll();
</script>
